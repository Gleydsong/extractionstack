name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: extractionstack_test
          POSTGRES_PASSWORD: extractionstack_test
          POSTGRES_DB: extractionstack_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U extractionstack_test -d extractionstack_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://extractionstack_test:extractionstack_test@localhost:5432/extractionstack_test?schema=public
      TEST_DATABASE_URL: postgresql://extractionstack_test:extractionstack_test@localhost:5432/extractionstack_test?schema=public
      REDIS_URL: redis://localhost:6379/0
      TEST_REDIS_URL: redis://localhost:6379/1
      LLM_PROVIDER_MODE: fake
      LLM_PROMPT_GENERATION_ENABLED: 'true'
      LLM_PROVIDER_OPENAI_ENABLED: 'false'
      LLM_PROVIDER_GEMINI_ENABLED: 'false'
      LLM_PLATFORM_CREDITS_ENABLED: 'false'
      LLM_PRICING_VERSION: ci-fake-v1
      LLM_PRICING_CATALOG_JSON: '[{"provider":"FAKE","model":"fake-deterministic-v1","inputMicrosPerMillionTokens":"1","cachedInputMicrosPerMillionTokens":"1","outputMicrosPerMillionTokens":"1","reasoningMicrosPerMillionTokens":"1","requireCachedTokens":false,"requireReasoningTokens":false}]'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.0.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: docker compose config --quiet
      - run: pnpm prisma:generate && pnpm prisma:migrate:deploy
      - run: pnpm verify
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
