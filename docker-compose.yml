services:
  postgres:
    image: postgres:16-alpine
    container_name: extractionstack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: extractionstack
      POSTGRES_PASSWORD: extractionstack
      POSTGRES_DB: extractionstack
    ports:
      - "5432:5432"
    volumes:
      - extractionstack-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extractionstack -d extractionstack"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  extractionstack-pgdata:
